name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@placeholder:5432/placeholder' }}

      - name: Check for Mongoose references in routers
        run: |
          echo "Checking for Mongoose references in routers..."
          MONGOOSE_COUNT=$(grep -rn "from.*mongoose\|require.*mongoose\|mongoose\.connect\|Schema\|\.findOne\|\.findById\|\.insertMany\|\.save()" backend/routers/ | wc -l)
          if [ "$MONGOOSE_COUNT" -gt 0 ]; then
            echo "❌ Found $MONGOOSE_COUNT Mongoose reference(s) in routers"
            grep -rn "from.*mongoose\|require.*mongoose\|mongoose\.connect\|Schema\|\.findOne\|\.findById\|\.insertMany\|\.save()" backend/routers/
            exit 1
          fi
          echo "✅ Zero Mongoose references found in routers"
        env:
          MONGOOSE_NOT_ALLOWED: true

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aims-backend:test .
